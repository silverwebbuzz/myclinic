
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);background:transparent;color:var(--color-text-primary);font-size:13px;line-height:1.6}

.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.top-title{font-size:16px;font-weight:500}
.top-stats{display:flex;gap:8px;flex-wrap:wrap}
.stat-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary)}
.stat-pill strong{color:var(--color-text-primary)}

.sprint-nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:14px;border-bottom:.5px solid var(--color-border-tertiary)}
.sn{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .15s;white-space:nowrap}
.sn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.sn.on{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}

.sprint-block{display:none}
.sprint-block.on{display:block}

.sprint-header{border-radius:10px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.sh-left{flex:1}
.sh-num{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.sh-title{font-size:15px;font-weight:500;margin-bottom:4px}
.sh-sub{font-size:12px;opacity:.75;line-height:1.5}
.sh-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.sh-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;background:rgba(255,255,255,.25);color:inherit}

.section-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--color-text-secondary);margin-bottom:8px;margin-top:16px;padding-left:2px}

.task-group{border:.5px solid var(--color-border-tertiary);border-radius:10px;overflow:hidden;margin-bottom:12px}
.tg-head{padding:9px 14px;background:var(--color-background-secondary);border-bottom:.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px}
.tg-icon{font-size:14px;flex-shrink:0}
.tg-title{font-size:12px;font-weight:500;flex:1}
.tg-count{font-size:10px;padding:2px 7px;border-radius:10px;border:.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);background:var(--color-background-primary)}

.task{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:.5px solid var(--color-border-tertiary);cursor:pointer;transition:background .1s;user-select:none}
.task:last-child{border-bottom:none}
.task:hover{background:var(--color-background-secondary)}
.task.done .task-text{text-decoration:line-through;color:var(--color-text-secondary);opacity:.6}
.task.done .check-box{background:#0F9B6E;border-color:#0F9B6E}
.task.done .check-box::after{content:'✓';color:#fff;font-size:10px;font-weight:600}

.check-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--color-border-secondary);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-body{flex:1}
.task-text{font-size:13px;line-height:1.4;margin-bottom:2px}
.task-sub{font-size:11px;color:var(--color-text-secondary);line-height:1.5}
.task-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.tt{font-size:10px;padding:1px 6px;border-radius:4px;border:.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);font-family:var(--font-mono,monospace)}
.task-pri{font-size:10px;padding:2px 6px;border-radius:6px;font-weight:500;flex-shrink:0;margin-top:1px}
.p-high{background:#FAECE7;color:#993C1D}
.p-med{background:#FAEEDA;color:#854F0B}
.p-low{background:#E6F1FB;color:#185FA5}

.progress-bar{height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;margin-bottom:3px}
.pb-fill{height:100%;border-radius:3px;background:#0F9B6E;transition:width .3s}

.sprint-progress{border:.5px solid var(--color-border-tertiary);border-radius:8px;padding:12px 14px;margin-bottom:14px}
.sp-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sp-label{font-size:12px;color:var(--color-text-secondary);min-width:80px}
.sp-stat{font-size:12px;font-weight:500;margin-left:auto;white-space:nowrap}

.note{background:var(--color-background-secondary);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--color-text-secondary);line-height:1.6}
.note strong{color:var(--color-text-primary)}
.note.green{border-left:3px solid #0F9B6E;border-radius:0 8px 8px 0}
.note.amber{border-left:3px solid #EF9F27;border-radius:0 8px 8px 0}

/* specialty color dots */
.spec-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px}
.spec-all{background:#6E6E73}
.spec-gp{background:#185FA5}
.spec-homeo{background:#0F9B6E}
.spec-dental{background:#854F0B}
.spec-derma{background:#993C1D}

.overall-progress{margin-bottom:20px;border:.5px solid var(--color-border-tertiary);border-radius:10px;padding:14px 16px}
.op-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.op-label{font-size:12px;font-weight:500;min-width:70px}
.op-bar{flex:1;height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
.op-fill{height:100%;border-radius:3px}
.op-count{font-size:11px;color:var(--color-text-secondary);min-width:50px;text-align:right}
</style>

<div class="top-bar">
  <div>
    <div class="top-title">ManageClinic — Sprint To-Do List</div>
    <div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">Click any task to mark it done · Track progress per sprint</div>
  </div>
  <div class="top-stats">
    <div class="stat-pill">Total tasks: <strong id="totalCount">0</strong></div>
    <div class="stat-pill">Done: <strong id="doneCount">0</strong></div>
    <div class="stat-pill">Remaining: <strong id="remCount">0</strong></div>
  </div>
</div>

<div class="overall-progress" id="overallProgress"></div>

<div class="sprint-nav" id="sprintNav"></div>
<div id="sprintContent"></div>

<script>
const SPRINTS = [
{
  id:'s1', label:'Sprint 1', num:'Sprint 1 · Week 1–2',
  title:'Auth — Register, Login, Logout, Password, Sessions',
  sub:'Everything before the user sees the app. The security foundation.',
  color:'#FAECE7', textColor:'#993C1D',
  tags:['PHP 8.2','JWT','bcrypt','MySQL','Mailgun','Redis'],
  groups:[
    { icon:'📝', title:'Registration flow', tasks:[
      { text:'Create signup page — /register', sub:'Fields: clinic name, email, password, confirm password. Vanilla JS inline validation (no submit until all valid).', tags:['PHP','Tailwind','Alpine.js'], pri:'high' },
      { text:'Slug auto-generation from clinic name', sub:'On clinic name input: auto-suggest slug (lowercase, hyphens, no special chars). Real-time AJAX check: GET /api/check-slug?slug=drfeelgoods → available/taken badge.', tags:['AJAX','PHP'], pri:'high' },
      { text:'Password strength indicator', sub:'Show strength bar: weak/fair/strong. Require: 8+ chars, 1 uppercase, 1 number. Match confirmation field.', tags:['Alpine.js'], pri:'med' },
      { text:'INSERT into tenants + users (is_owner=1)', sub:'On submit: create tenants row (slug, plan=free, seat_limit=2, trial_ends_at=now+14days) → create users row (is_owner=1, role=admin). Both in DB transaction — rollback if either fails.', tags:['PHP','MySQL','Transaction'], pri:'high' },
      { text:'Welcome email via Mailgun', sub:'Send "Welcome to ManageClinic" email with clinic name, login URL, and 3 getting-started tips. Use Mailgun SDK. Log to notifications table.', tags:['Mailgun','PHP'], pri:'med' },
      { text:'Auto-login after registration', sub:'After successful signup: generate JWT → set HttpOnly cookie → redirect to /onboarding/plan-selection (NOT dashboard yet — must pick plan first).', tags:['JWT','PHP'], pri:'high' },
    ]},
    { icon:'🔐', title:'Login flow', tasks:[
      { text:'Login page — /login', sub:'Email + password fields. "Remember me" checkbox. "Forgot password?" link. Show clinic slug field if multiple accounts on same email (edge case).', tags:['PHP','Tailwind'], pri:'high' },
      { text:'bcrypt password verification', sub:'password_verify($input, $hash). On success: generate JWT (15min expiry). Refresh token (30-day) stored in users.remember_token. Set JWT in HttpOnly cookie. Set refresh token in separate HttpOnly cookie.', tags:['PHP','bcrypt','JWT'], pri:'high' },
      { text:'Brute force lockout via Redis', sub:'Track failed attempts: INCR auth:failed:{email} with TTL 900s. After 5 failures within 15min → return 429 with "Too many attempts. Try again in X minutes." Show CAPTCHA after 3 failures.', tags:['Redis','PHP'], pri:'high' },
      { text:'Remember me — persistent login', sub:'If remember_me=1: store refresh token hash in users.remember_token. On return visit with expired JWT but valid refresh cookie → auto re-issue JWT. Refresh tokens valid 30 days.', tags:['PHP','MySQL'], pri:'med' },
      { text:'Redirect logic after login', sub:'If onboarding not complete → /onboarding/plan-selection. If settings not complete → /onboarding/clinic-setup. Else → /dashboard. Check onboarding_step on tenants table.', tags:['PHP'], pri:'high' },
      { text:'Google OAuth login', sub:'league/oauth2-google. "Continue with Google" button. On callback: check if email exists → link account. If new → create account. Same JWT flow as password login.', tags:['OAuth2','PHP'], pri:'med' },
      { text:'Multi-device session display', sub:'Show active sessions in Settings: device, browser, IP, last active. "Sign out all other devices" button → clears all refresh tokens except current.', tags:['PHP','MySQL'], pri:'low' },
    ]},
    { icon:'🔑', title:'Password management', tasks:[
      { text:'Forgot password page — /forgot-password', sub:'Enter email → show "If this email exists, we sent a reset link." Always show same message (prevent email enumeration). Queue email via notifications table.', tags:['PHP','Security'], pri:'high' },
      { text:'Password reset email via Mailgun', sub:'Generate 64-char random token → hash (SHA-256) → store in password_reset_tokens table (expires 1hr). Email link: /reset-password/{raw_token}.', tags:['Mailgun','PHP'], pri:'high' },
      { text:'password_reset_tokens table', sub:'CREATE TABLE password_reset_tokens (id, email, token_hash VARCHAR(64), expires_at TIMESTAMP, used_at TIMESTAMP NULL). INDEX on email.', tags:['MySQL'], pri:'high' },
      { text:'Reset password page — /reset-password/{token}', sub:'Verify token: hash input → compare to DB → check expires_at > NOW() AND used_at IS NULL. Show new password + confirm form. On submit: UPDATE users SET password_hash = bcrypt(new). SET used_at = NOW(). Invalidate all sessions (clear remember_token).', tags:['PHP','bcrypt'], pri:'high' },
      { text:'Change password (logged-in user) — /settings/password', sub:'Fields: current password, new password, confirm. Verify current → update hash. Invalidate all other sessions. Show success toast.', tags:['PHP'], pri:'med' },
    ]},
    { icon:'🚪', title:'Logout', tasks:[
      { text:'Logout endpoint — POST /logout', sub:'Clear JWT cookie (set expired). Clear refresh token cookie. SET users.remember_token = NULL. Redirect to /login. Use POST not GET to prevent CSRF logout.', tags:['PHP','Security'], pri:'high' },
      { text:'Auto-logout on JWT expiry', sub:'Client-side: decode JWT expiry from cookie. 1 min before expiry: silently call GET /api/refresh-token. On 401 response: redirect to /login with "Session expired" message.', tags:['JS','PHP'], pri:'med' },
    ]},
    { icon:'🛡️', title:'Security essentials', tasks:[
      { text:'CSRF protection on all state-changing routes', sub:'Generate CSRF token on each page load → store in session → hidden input in every form → verify on POST/PUT/DELETE. Exempt: API routes (JWT authenticated).', tags:['PHP','Security'], pri:'high' },
      { text:'Rate limiting middleware', sub:'RateLimitMiddleware: use Redis. /login: 10 req/min per IP. /forgot-password: 3 req/hr per IP. /api/*: 60 req/min per JWT. Return 429 with Retry-After header.', tags:['Redis','PHP'], pri:'high' },
      { text:'Input sanitization on all user inputs', sub:'Strip HTML tags from all inputs. Trim whitespace. All DB queries use PDO prepared statements — never string concatenation. htmlspecialchars() on all output.', tags:['PHP','Security'], pri:'high' },
      { text:'Audit log: LOGIN and LOGOUT events', sub:'On every login/logout: INSERT into audit_log (user_id, clinic_id, action=LOGIN/LOGOUT, ip_address, user_agent, created_at). Used for security reviews and GDPR compliance.', tags:['PHP','MySQL'], pri:'med' },
    ]},
  ]
},
{
  id:'s2', label:'Sprint 2', num:'Sprint 2 · Week 2–3',
  title:'Onboarding — Plan Selection → Clinic Setup → Specialty Config',
  sub:'The critical path from signup to a working clinic. No patient can be added until this is complete.',
  color:'#EEEDFE', textColor:'#534AB7',
  tags:['Alpine.js','Stripe','Razorpay','PHP','MySQL'],
  groups:[
    { icon:'💳', title:'Step 1 — Plan selection screen', tasks:[
      { text:'Plan selection page — /onboarding/plan-selection', sub:'Full-screen page (no sidebar yet). 4 plan cards: Free (auto-selected), Clinic $29, Practice $79, Enterprise $199. Yearly toggle (saves 20%) — prices update live. "Continue with Free" vs "Start with Clinic — 14-day free trial" CTA buttons.', tags:['Alpine.js','Tailwind'], pri:'high' },
      { text:'Plan card design', sub:'Each card: plan name, price, seat limit, module list with ✓ and ✗. Featured (Practice): dark background card. Highlight differences clearly — e.g. "Free: 100 patients max" vs "Clinic: Unlimited". Recommended badge on Practice.', tags:['Tailwind'], pri:'high' },
      { text:'Free plan selection flow', sub:'Click "Continue with Free" → UPDATE tenants SET plan=free, seat_limit=2, onboarding_step=2 → redirect to /onboarding/clinic-setup. No payment needed.', tags:['PHP','MySQL'], pri:'high' },
      { text:'Paid plan selection — Stripe Checkout (global)', sub:'Click "Start Clinic plan" → detect country. If IN/SG/MY → Razorpay. Else → Stripe. Stripe: create Checkout Session with trial_period_days=14. Redirect to Stripe hosted page. On success: Stripe webhook updates tenants.plan.', tags:['Stripe','PHP'], pri:'high' },
      { text:'Paid plan selection — Razorpay (India)', sub:'Create Razorpay Subscription with 14-day trial. Open Razorpay checkout in modal (Razorpay.js). On success callback: verify signature → update tenants.plan → continue.', tags:['Razorpay','PHP'], pri:'high' },
      { text:'Stripe/Razorpay webhook handlers', sub:'POST /webhooks/stripe: verify stripe-signature header → handle: checkout.session.completed, invoice.paid, invoice.payment_failed, customer.subscription.deleted. Update tenants.plan + seat_limit accordingly. POST /webhooks/razorpay: verify X-Razorpay-Signature → same logic.', tags:['PHP','Stripe','Razorpay'], pri:'high' },
    ]},
    { icon:'🏥', title:'Step 2 — Clinic basic setup — /onboarding/clinic-setup', tasks:[
      { text:'Clinic name, address, phone, email', sub:'Pre-filled with signup data. Editable. Phone: international format with country code flag picker. Address: street, city, state, postal code, country (dropdown). All saved to tenants table.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Logo upload', sub:'Upload PNG/JPG (max 2MB). Client-side preview (FileReader). Upload to Cloudflare R2 at /logos/{clinic_id}.{ext}. Save path to tenants.logo_path. Show resized preview (120px circle).', tags:['PHP','R2'], pri:'med' },
      { text:'Specialty selection', sub:'Visual grid of 6 specialty cards: GP (stethoscope icon), Homeopathy (leaf), Dental (tooth), Dermatology (skin), Pediatrics (baby), Physiotherapy (running). Click to select. Selected = highlighted border + checkmark. Single select. Critical — determines all future field sets.', tags:['Alpine.js','Tailwind'], pri:'high' },
      { text:'UHID prefix setup', sub:'Input: "Patient ID prefix" — default based on clinic name initials. Preview: "Your patients will be: DFG-00001, DFG-00002…". Max 6 chars. Saved to specialty_configs.uhid_prefix.', tags:['PHP','Alpine.js'], pri:'med' },
      { text:'Currency and tax setup', sub:'Currency: auto-selected from country. Override allowed. Tax label: GST (India) / VAT (UK, EU) / HST (Canada) / none. Tax percentage: 0–30%. Saved to specialty_configs: invoice_tax_label, invoice_tax_percent.', tags:['PHP'], pri:'high' },
      { text:'Working hours setup', sub:'Grid: Mon–Sun. Each day: toggle on/off + start time + end time. Can add 2 sessions per day (morning + evening). Preview: "Mon: 9:30 AM – 1:30 PM, 4:30 PM – 8:30 PM". Saved as JSON to specialty_configs.working_hours.', tags:['Alpine.js','PHP'], pri:'high' },
      { text:'Consultation fee', sub:'Default consultation fee (shown on invoices). Currency symbol shown based on selection. Optional — can be 0. Saved to specialty_configs or a clinic_services table for later extensibility.', tags:['PHP'], pri:'med' },
    ]},
    { icon:'🔬', title:'Step 3 — Specialty-specific config (conditional per specialty)', tasks:[
      { text:'GP config: ICD-10 code lookup preference', sub:'Toggle: "Enable ICD-10 diagnosis codes?" (default on). Drug DB: use global platform drug DB or upload custom. Default drug frequency options (OD/BD/TDS/QID/SOS). Shown only if specialty = GP.', tags:['PHP','Alpine.js'], pri:'med' },
      { text:'Homeopathy config: remedy DB + case-taking fields', sub:'Which case-taking fields to show: Mental generals ✓, Physical generals ✓, Peculiar symptoms ✓, Modalities ✓, Miasmatic analysis (optional toggle). Potency system: Centesimal (C) / LM / Both. Dietary antidote warnings: on/off. Specialty = homeopathy only.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Dental config: tooth chart + procedure codes', sub:'Tooth numbering system: FDI (01–48, international) or Universal (1–32, US). Default procedures list (editable): scaling, RCT, extraction, crown, filling, implant. X-ray: upload or link. Shown only if specialty = dental.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Dermatology config: skin assessment fields', sub:'Enable skin condition score (1–10 scale)? Photo before/after tracking enabled? Body map for condition marking? Standard conditions list (psoriasis, eczema, acne, vitiligo, urticaria) — pre-loaded tags. Specialty = derma only.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Pediatrics config: growth chart + vaccine schedule', sub:'WHO growth chart region (Global / South Asia / etc). Vaccination schedule: India IAP / UK NHS / US CDC. Growth parameters to track: weight, height, head circumference. Shown only if specialty = peds.', tags:['PHP','Alpine.js'], pri:'med' },
      { text:'Physiotherapy config: ROM + session setup', sub:'ROM measurements to track: per joint (shoulder, knee, hip, etc.). Pain scale: NRS 0–10 or VAS. Session duration: 30 / 45 / 60 min (default). Exercise library: use global or build custom. Specialty = physio only.', tags:['PHP','Alpine.js'], pri:'med' },
      { text:'Save specialty_configs row', sub:'On Step 3 completion: INSERT or UPDATE specialty_configs with all collected values. Set prescription_mode based on specialty (allopathic for GP, homeopathic for homeo, dental for dental, both for derma). Also create default doctor_schedules rows from working hours entered in Step 2.', tags:['PHP','MySQL'], pri:'high' },
    ]},
    { icon:'💬', title:'Step 4 — Notification setup', tasks:[
      { text:'WhatsApp Business number setup', sub:'Option A: Connect own WhatsApp Business number (enter Meta API token + phone number ID). Option B: Use ManageClinic shared WhatsApp number (limited, 50 msgs/month free). Test button: send test message to doctor\'s own number. Save to specialty_configs.whatsapp_number + whatsapp_token.', tags:['Meta API','PHP'], pri:'high' },
      { text:'Notification preference toggles', sub:'Which events should trigger WhatsApp: Appointment reminder (24h) ✓, Appointment reminder (1h) ✓, Prescription delivery ✓, Lab report ready ✓, Follow-up reminder ✓. All default ON. Saved as JSON in clinic settings.', tags:['PHP','Alpine.js'], pri:'med' },
      { text:'Razorpay UPI setup (for patient billing)', sub:'Optional in onboarding. "Connect Razorpay for instant UPI payments?" → Enter Razorpay Key + Secret → Test connection button → verify with test API call. Save to specialty_configs. Can skip and set up later in Settings.', tags:['Razorpay','PHP'], pri:'med' },
    ]},
    { icon:'✅', title:'Step 5 — Onboarding complete + first login to dashboard', tasks:[
      { text:'Onboarding complete screen', sub:'Confetti animation. Summary: "Your clinic is ready! Here\'s what you set up: Specialty: Homeopathy · Seats: 2 free · Plan: 14-day Clinic trial · WhatsApp: Connected." Big CTA: "Go to Dashboard →".', tags:['Alpine.js','CSS'], pri:'med' },
      { text:'SET tenants.onboarding_step = 5 (complete)', sub:'On completion: UPDATE tenants SET onboarding_step = 5, onboarding_completed_at = NOW(). This flag is checked on every login to know whether to redirect to onboarding or dashboard.', tags:['PHP','MySQL'], pri:'high' },
      { text:'In-app onboarding checklist (dashboard widget)', sub:'After onboarding complete, dashboard shows a collapsible "Getting started" checklist: ✓ Clinic setup done · ☐ Add first patient · ☐ Book first appointment · ☐ Add payment method · ☐ Invite a team member · ☐ Add consultation fee. Dismiss when 100% done.', tags:['Alpine.js','PHP'], pri:'med' },
    ]},
  ]
},
{
  id:'s3', label:'Sprint 3', num:'Sprint 3 · Week 3–4',
  title:'Dashboard + Layout Shell + Settings',
  sub:'The frame everything else lives inside. Must be pixel-perfect before building features.',
  color:'#E6F1FB', textColor:'#185FA5',
  tags:['Tailwind','Alpine.js','Chart.js','PHP'],
  groups:[
    { icon:'🖼️', title:'Layout shell', tasks:[
      { text:'Main layout template (base.php)', sub:'Structure: <div class="layout"><sidebar/><div class="main"><topbar/><content/></div></div>. PHP include system for partials. One layout for all clinic pages. Separate layout for /portal/* (patient-facing).', tags:['PHP','Tailwind'], pri:'high' },
      { text:'Sidebar — dynamic from active modules', sub:'Sidebar nav items = array of active clinic_modules from Redis. Each module has a route + icon + label. Grouped: Clinical, Operations, Reports. Active state based on current URL. Collapse to icon-only on mobile. White-label: show tenants.logo_path + tenants.name at top.', tags:['PHP','Alpine.js','Redis'], pri:'high' },
      { text:'Topbar', sub:'Left: hamburger (mobile) + page title. Right: notification bell (unread count badge) + clinic name + avatar dropdown (profile, settings, logout). Avatar shows first letter of user name if no photo.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Responsive: mobile + tablet', sub:'Sidebar: desktop = fixed 240px. Tablet (768px–1024px) = collapsible overlay. Mobile (<768px) = hidden, opens via hamburger. Content area: adapts. Tables: horizontal scroll on mobile. Forms: stack to single column.', tags:['Tailwind','CSS'], pri:'high' },
      { text:'Toast notification component', sub:'Alpine.js global toast system. Usage: $dispatch("toast", {msg: "Patient saved", type: "success"}). Types: success (green), error (red), warning (amber), info (blue). Auto-dismiss after 3s. Stack multiple toasts.', tags:['Alpine.js'], pri:'high' },
      { text:'Modal component (global reusable)', sub:'Alpine.js. $dispatch("modal", {title, content, confirmText, onConfirm}). Backdrop click closes. ESC closes. Confirm dialog variant: "Are you sure you want to delete?" with red confirm button.', tags:['Alpine.js'], pri:'high' },
      { text:'Loading state + skeleton screens', sub:'Every data-loading section shows skeleton (grey animated bars) while PHP fetches data. No blank white flashes. AJAX requests show spinner overlay on the component, not full page.', tags:['CSS','Alpine.js'], pri:'med' },
      { text:'Brand colour injection (white-label)', sub:'On every page load: read tenants.brand_color → output <style>:root{--brand:#0F9B6E;--brand-dark:#076B4C}</style> in <head>. All teal references in Tailwind config use var(--brand). If no custom colour → default ManageClinic green.', tags:['PHP','CSS'], pri:'med' },
    ]},
    { icon:'📊', title:'Dashboard (today\'s view)', tasks:[
      { text:'Today\'s stats tiles (4 tiles)', sub:'Patients seen today · Appointments pending · Revenue today (sum of paid invoices) · Follow-ups due. All from simple DB queries. Cache in Redis 5 min. Show loading skeleton while fetching.', tags:['PHP','MySQL','Redis'], pri:'high' },
      { text:'Today\'s queue widget', sub:'List of today\'s appointments (scheduled_at = today) for the logged-in doctor. Status badges. "Start consultation" button → opens visit screen. Auto-refreshes every 60s via AJAX.', tags:['PHP','AJAX'], pri:'high' },
      { text:'Low stock alert widget (Pharmacy module)', sub:'ModuleGate::check("pharmacy") → if active: show list of medicines where quantity ≤ low_stock_threshold OR expiry_date ≤ 30 days. Only shown if pharmacy module is active.', tags:['PHP','ModuleGate'], pri:'med' },
      { text:'Onboarding checklist widget', sub:'Shown until tenants.onboarding_completed = true (all items checked). Items: Add logo, set hours, add first patient, add payment method, invite a team member. Each item links to the relevant section. Dismiss button after 100%.', tags:['PHP','Alpine.js'], pri:'med' },
    ]},
    { icon:'⚙️', title:'Clinic settings — /settings', tasks:[
      { text:'Settings page structure', sub:'Tab layout: General · Working Hours · Notifications · Billing · Team · Integrations · Subscription. Each tab = separate partial loaded via AJAX or page sections. Breadcrumb: Settings > General.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'General settings tab', sub:'Edit: clinic name, logo, address, phone, email, GSTIN, UHID prefix, invoice prefix, consultation fee, currency, tax label, tax percent, timezone. All from tenants + specialty_configs. Save button with success toast.', tags:['PHP','MySQL'], pri:'high' },
      { text:'Working hours tab', sub:'Same UI as onboarding Step 2 working hours. Edit any day. Toggle on/off. Preview generated schedule. Changes update specialty_configs.working_hours + regenerate doctor_schedules rows.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Specialty settings tab', sub:'Show specialty-specific config based on current specialty. Can change specialty (with warning: "This will reset specialty-specific fields in patient records"). All the same fields as onboarding Step 3.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Notification settings tab', sub:'WhatsApp token update. Test WhatsApp button. Toggle each notification event on/off. Preview message template for each. Razorpay test connection button.', tags:['PHP','Meta API'], pri:'med' },
      { text:'Subscription tab', sub:'Current plan, next billing date, amount. Active modules list with monthly cost. "Upgrade plan" → plan selection page. "Add extra seat" → purchase flow. Invoice history table (saas_invoices). Cancel plan flow.', tags:['PHP','Stripe'], pri:'high' },
    ]},
  ]
},
{
  id:'s4', label:'Sprint 4', num:'Sprint 4 · Week 4–5',
  title:'Patient Management — Registration, QR, Profile, Search',
  sub:'The first real clinical feature. Everything else links back to a patient record.',
  color:'#E1F5EE', textColor:'#0F6E56',
  tags:['PHP','MySQL','mPDF','QR','R2','Alpine.js'],
  groups:[
    { icon:'🧑', title:'Patient registration — 3-step wizard', tasks:[
      { text:'Step 1: Personal details', sub:'Fields: Full name*, DOB (date picker), Gender (M/F/Other), Phone* (with country code), Email, Address (city + state auto-complete), Blood group dropdown, Veg type (Veg/Non-veg/Vegan/Eggetarian), Photo upload (R2). Required: name + phone. Auto-save draft to localStorage every 30s.', tags:['PHP','Alpine.js','R2'], pri:'high' },
      { text:'Step 2: Medical history', sub:'Allergies (tag input — type drug name + enter to add). Chronic conditions (tag input). Past surgeries (text). Family history (text). Insurance provider + policy number (optional). Show "No known allergies" checkbox.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Step 3: Specialty profile (conditional per specialty)', sub:'GP: nothing extra (generic). Homeopathy: Constitution type (Psoric/Sycotic/Syphilitic/Tubercular/Mixed), Thermal sensitivity (Hot/Cold/Chilly), Food cravings (tags), Food aversions (tags), Mental state notes. Dental: existing dental work notes. Derma: skin type (dry/oily/combination/normal), known skin conditions. Peds: birth weight, birth length, delivery type, gestational age.', tags:['PHP','Alpine.js','specialty_data JSON'], pri:'high' },
      { text:'UHID auto-generation on save', sub:'On form submit: SELECT MAX(uhid_seq) FROM patients WHERE clinic_id=? → increment → format as {prefix}-{5-digit-padded}. E.g. DFG-00001. Use DB transaction + SELECT FOR UPDATE to prevent duplicates under concurrent saves.', tags:['PHP','MySQL'], pri:'high' },
      { text:'QR token generation + QR card PDF', sub:'Generate UUID v4 as qr_token → INSERT patient. Generate QR PNG pointing to https://app.manageclinic.com/qr/{token} using endroid/qr-code. Embed in A6 mPDF card: clinic logo, patient name, UHID, QR code, "Scan to load patient record" text. Save PDF to R2. Show "Print QR card" button.', tags:['PHP','mPDF','R2','QR'], pri:'high' },
      { text:'Step indicator + back navigation', sub:'3 dots / numbered steps at top. Back button on steps 2 and 3 — preserves entered data (use Alpine.js state object). Progress bar 0→33→66→100%.', tags:['Alpine.js'], pri:'med' },
      { text:'Duplicate patient detection', sub:'Before save: SELECT COUNT(*) FROM patients WHERE clinic_id=? AND phone=? If found → show warning modal: "A patient with this phone already exists: {name}. Add anyway or view existing?" Not a hard block — allow duplicates with confirmation.', tags:['PHP','MySQL'], pri:'med' },
    ]},
    { icon:'🔍', title:'Patient list + search', tasks:[
      { text:'Patient list page — /patients', sub:'Table: UHID, Name, Phone, Age, Blood group, Last visit date, Status (active/inactive). Pagination: 20 per page. Sort by: name, UHID, last visit. Default: newest first.', tags:['PHP','MySQL'], pri:'high' },
      { text:'Live search AJAX', sub:'Search input at top: debounce 300ms → GET /api/patients/search?q={query}&clinic_id. Query: SELECT * FROM patients WHERE clinic_id=? AND (name LIKE ? OR phone LIKE ? OR uhid LIKE ?) LIMIT 10. Return JSON → update list without page reload.', tags:['PHP','AJAX','MySQL'], pri:'high' },
      { text:'Filter panel', sub:'Filter by: Gender, Blood group, Veg type, Last visit (this week / this month / 3 months / custom range), Referring doctor, Source (walk-in / online / referral). Apply → URL params update → results refresh.', tags:['PHP','Alpine.js'], pri:'med' },
      { text:'QR scan button', sub:'Top-right button: "Scan QR". Opens camera (navigator.mediaDevices.getUserMedia). Uses jsQR library to decode. On decode: GET /api/patients/by-qr/{token}?clinic_id={id}. Load patient profile. Works on mobile + desktop with webcam.', tags:['JS','jsQR','PHP'], pri:'high' },
    ]},
    { icon:'👤', title:'Patient profile page — /patients/{id}', tasks:[
      { text:'Profile header', sub:'Large: patient photo (or initials avatar), name, UHID badge, age, blood group badge, veg type badge, phone (click to call on mobile), email. Action buttons: Edit · Book appointment · New visit · Print QR card.', tags:['PHP','Tailwind'], pri:'high' },
      { text:'Tab: Overview', sub:'Recent vitals summary (last reading of each metric). Active prescriptions list (last visit). Upcoming appointments. Allergies + chronic conditions tags. Specialty data summary (constitution type for homeo, skin type for derma, etc).', tags:['PHP'], pri:'high' },
      { text:'Tab: Visits', sub:'Timeline of all visits, newest first. Each visit: date, doctor name, chief complaint, diagnosis, condition score (1–10 with colour). Click to expand: full notes, prescription, vitals for that visit. "Start new visit" button at top.', tags:['PHP','CSS'], pri:'high' },
      { text:'Tab: Vitals (charts)', sub:'Chart.js line charts: BP trend, Blood sugar trend, Weight/BMI trend, TSH/T3/T4 (if homeo/GP). Skin score trend (if derma/homeo). Filter: last 5 / 10 / all readings. Each chart shows normal range band.', tags:['PHP','Chart.js'], pri:'high' },
      { text:'Tab: Prescriptions', sub:'All prescriptions history. Group by visit. Show: drug/remedy name, potency (homeo), dosage, frequency, duration. "Download Rx PDF" button per prescription. "Resend via WhatsApp" button.', tags:['PHP'], pri:'high' },
      { text:'Tab: Lab / Radiology', sub:'List of lab orders and radiology orders. Status badge (ordered / resulted / shared). Download report PDF. Resend via WhatsApp. Only shown if lab / radiology module is active (ModuleGate check).', tags:['PHP','ModuleGate'], pri:'med' },
      { text:'Tab: Invoices', sub:'All invoices for this patient. Status: draft / paid / overdue. Amount. Date. Download PDF. Only shown if billing module active.', tags:['PHP'], pri:'med' },
      { text:'Tab: Documents', sub:'Consent forms signed (with date + form type + download PDF). Discharge summaries. Before/after photos (if module active). Lab report PDFs.', tags:['PHP'], pri:'med' },
      { text:'Edit patient modal', sub:'Same 3-step form, pre-filled. Save → UPDATE patients + specialty_data JSON. Show diff of what changed (nice-to-have). Audit log entry on save.', tags:['PHP','MySQL'], pri:'high' },
    ]},
    { icon:'📱', title:'QR system', tasks:[
      { text:'QR scan route — /qr/{token}', sub:'GET /qr/{token}: SELECT patient WHERE qr_token=? AND clinic_id=? (clinic_id from subdomain). If found → redirect to /patients/{id}. If not found → "Patient not found in this clinic" page. If wrong clinic (QR from another clinic) → "This patient is registered at another clinic" — show only patient name, suggest searching by phone.', tags:['PHP','MySQL'], pri:'high' },
      { text:'QR card PDF design', sub:'A6 size (148×105mm). Clinic logo top-left. Patient name large. UHID below name. QR code right side (80×80px). Bottom: "Scan to view medical record · manageclinic.com" in small grey text. Print button sends to browser print dialog (window.print()) with correct page size CSS.', tags:['mPDF','CSS'], pri:'med' },
      { text:'Regenerate QR token', sub:'Button on patient profile: "Regenerate QR". Confirm dialog: "Old QR card will no longer work." Generate new UUID → update qr_token → regenerate QR card PDF → save to R2. Previous QR card becomes invalid immediately.', tags:['PHP','MySQL'], pri:'low' },
    ]},
  ]
},
{
  id:'s5', label:'Sprint 5', num:'Sprint 5 · Week 5–7',
  title:'Appointments + Queue + Doctor Scheduling',
  sub:'The daily operational flow. Every clinic\'s most-used feature.',
  color:'#FAEEDA', textColor:'#854F0B',
  tags:['PHP','MySQL','Redis','Alpine.js','AJAX'],
  groups:[
    { icon:'📅', title:'Doctor scheduling setup', tasks:[
      { text:'Working hours → doctor_schedules rows', sub:'On onboarding completion (or settings change): for each day in specialty_configs.working_hours → INSERT or UPDATE doctor_schedules (clinic_id, doctor_id, day_of_week, start_time, end_time, slot_duration, max_patients). For multi-doctor clinics: each doctor has their own schedule.', tags:['PHP','MySQL'], pri:'high' },
      { text:'Leave calendar — /settings/leaves', sub:'Calendar view of the month. Click a date → mark as leave (full day / morning only / evening only). Confirm. INSERT into doctor_leaves. Leave dates show red on calendar. Any existing appointments on that date → show warning list.', tags:['PHP','Alpine.js'], pri:'med' },
    ]},
    { icon:'🗓️', title:'Slot availability engine', tasks:[
      { text:'Slot calculation API — GET /api/slots', sub:'Params: doctor_id, date, clinic_id. Logic: (1) Load doctor_schedules for that day_of_week. (2) Check doctor_leaves for that date. (3) Generate all slots (start_time + slot_duration intervals). (4) Subtract booked appointments (status != cancelled, no_show). (5) Return array of {time, is_available, appointment_id_if_booked}. Cache in Redis key "slots:{clinic_id}:{doctor_id}:{date}" TTL 5 min. Invalidate on new booking / cancellation.', tags:['PHP','MySQL','Redis'], pri:'high' },
      { text:'Slot availability UI — grid of time buttons', sub:'Visual slot picker: time buttons in a grid (9:30, 10:00, 10:30, …). Available = green outline. Booked = grey/disabled. Selected = filled green. Click available slot → fills appointment form. Refresh slots every 60s (another user may book same slot).', tags:['Alpine.js','AJAX'], pri:'high' },
    ]},
    { icon:'➕', title:'Book appointment', tasks:[
      { text:'Book appointment form — /appointments/new', sub:'Fields: Patient (search-as-you-type by name/phone/UHID → show matching patients), Doctor (dropdown — active doctors), Date picker (calendar — past dates disabled, leave dates greyed), Time slot picker (from API), Type (pre-booked / walk-in / online / follow-up), Chief complaint (optional), Notes (optional).', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Walk-in token flow', sub:'"Walk-in" type: skip date/time picker. Auto-assign token_number = max(token_number WHERE clinic_id=? AND DATE(scheduled_at)=TODAY AND status != cancelled) + 1. Scheduled_at = NOW(). Show token number prominently after save.', tags:['PHP','MySQL'], pri:'high' },
      { text:'Appointment confirmation', sub:'On save: INSERT into appointments. Queue WhatsApp reminder notification (scheduled_at - 24h). Show success: "Appointment booked · Token #7 · Dr. Priya · Today 11:30 AM". Option to print appointment slip (small mPDF).', tags:['PHP','MySQL','WhatsApp'], pri:'high' },
      { text:'Follow-up auto-appointment', sub:'From visit screen: doctor sets follow_up_date → system auto-opens "Book follow-up" form pre-filled with same patient + same doctor + follow_up_date. Admin/receptionist confirms time slot. is_followup=1.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Edit + cancel appointment', sub:'From appointment detail: Edit (change date/time/doctor — only allowed if status = scheduled or confirmed). Cancel (status = cancelled, select reason: patient request / doctor unavailable / other). Cancelled appointments free up the slot (Redis cache invalidated). Send WhatsApp cancellation notification.', tags:['PHP','MySQL','Redis'], pri:'high' },
    ]},
    { icon:'🎫', title:'Today\'s queue — /queue', tasks:[
      { text:'Queue display page', sub:'Main view for receptionist. Shows all today\'s appointments for all doctors (or filter by doctor). Columns: Token #, Patient name, Doctor, Time, Status, Action. Sort by token number. Auto-refresh every 30s via AJAX.', tags:['PHP','AJAX','Alpine.js'], pri:'high' },
      { text:'Token display screen (waiting room tablet)', sub:'Separate full-screen URL: /queue/display. Shows current token being seen. Queue of next 5 tokens. Clinic name + logo. Large font. No login required (public within clinic network). Auto-refreshes every 10s. Suitable for TV/large tablet in waiting room.', tags:['PHP','CSS','AJAX'], pri:'med' },
      { text:'Status action buttons', sub:'For each patient in queue: "Mark arrived" (status: scheduled → confirmed). "Call in" (confirmed → in_progress — triggers queue display screen update). "Complete" (in_progress → completed — triggers invoice creation if billing module active). "No show" (mark no_show, free the slot). Status changes logged in audit_log.', tags:['PHP','AJAX'], pri:'high' },
      { text:'Appointment calendar view — /appointments', sub:'Month/week view calendar (FullCalendar.js or custom). Each appointment shown as coloured block (colour by status). Click → appointment detail popup. Filter: by doctor, by status. "New appointment" button.', tags:['PHP','FullCalendar.js'], pri:'med' },
    ]},
  ]
},
{
  id:'s6', label:'Sprint 6', num:'Sprint 6 · Week 7–9',
  title:'Clinical Visit / EMR + Vitals + Prescription (specialty-aware)',
  sub:'The doctor\'s core screen. Different fields shown per specialty. Most complex sprint.',
  color:'#EAF3DE', textColor:'#3B6D11',
  tags:['PHP','MySQL','Chart.js','FULLTEXT','Alpine.js','mPDF'],
  groups:[
    { icon:'🩺', title:'Visit screen — /visits/new or /visits/{id}', tasks:[
      { text:'Open visit from queue', sub:'Receptionist clicks "Call in" → status → in_progress → Doctor\'s queue updates → Doctor clicks "Start consultation" → /visits/new?patient_id={id}&appointment_id={id}. Auto-creates visits row with clinic_id, patient_id, doctor_id, appointment_id. Visit stays "in progress" until doctor clicks "Complete visit".', tags:['PHP','MySQL'], pri:'high' },
      { text:'Visit screen tab structure', sub:'Tabs across the top: Vitals · Chief Complaint & History · Case Taking · Diagnosis · Prescription · Consent · Notes · Discharge. On mobile: tab dropdown. Active tab highlighted. Tab content loaded lazily (AJAX on tab click). Auto-save current tab on tab switch.', tags:['Alpine.js','PHP'], pri:'high' },
      { text:'Auto-save every 30 seconds', sub:'While visit is open: every 30s → AJAX POST /api/visits/{id}/autosave with current form data as JSON → UPDATE visits SET field = value. Show "Saved just now" indicator. On network error: show "Save failed — retrying" badge.', tags:['PHP','AJAX','Alpine.js'], pri:'high' },
      { text:'Previous visits quick panel', sub:'Collapsible right panel: last 3 visits summary (date, diagnosis, Rx). Helps doctor compare without leaving current visit. Collapses to icon on small screens.', tags:['PHP','Alpine.js'], pri:'med' },
    ]},
    { icon:'📏', title:'Vitals tab (specialty-adapted)', tasks:[
      { text:'Standard vitals entry form', sub:'Fields for all specialties: BP systolic + diastolic (mmHg), Blood sugar (mg/dL) + type (fasting/PP/random), Weight (kg), Height (cm), Temperature (°F or °C toggle), SpO2 (%), Pulse rate (bpm). BMI auto-calculated and displayed (formula: weight/height²). Input via number keyboard on mobile.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Specialty-specific vitals fields', sub:'GP: + HbA1c %, Haemoglobin g/dL. Homeopathy: + TSH/T3/T4, Skin score 1–10 (slider with label). Dermatology: + Skin score 1–10, Affected body surface % (BSA). Pediatrics: + Head circumference (cm), WHO percentile (auto-calculated). Physio: + Pain scale 0–10, ROM per joint (degrees). Fields shown/hidden via specialty_adapter.', tags:['PHP','Alpine.js','specialty_data'], pri:'high' },
      { text:'Trend charts (Chart.js)', sub:'After vitals save: show mini sparkline charts below each metric showing last 10 readings. Colour: green if in normal range, amber if borderline, red if outside range. Click chart → expand to full Chart.js line chart with date labels.', tags:['Chart.js','PHP'], pri:'high' },
      { text:'Normal range comparison', sub:'Each vital: show normal range below the input (e.g. "Normal BP: 90–120 / 60–80"). If value entered is outside range → input border turns red → show warning badge "Above normal range". Does not block save.', tags:['Alpine.js'], pri:'med' },
    ]},
    { icon:'📋', title:'Case taking tab (specialty-adapted)', tasks:[
      { text:'GP case taking fields', sub:'Chief complaint (required textarea). History of present illness. Past medical history. Family history. Social history (smoking/alcohol/occupation). Examination findings. All standard text areas. Autofill from previous visit (toggle "Copy from last visit").', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Homeopathy case taking fields', sub:'Chief complaint. Onset + duration + modalities (better/worse from: heat, cold, motion, rest, morning, evening). Mental generals (anxiety, fears, irritability, grief, concentration). Physical generals (sleep: deep/disturbed/position; appetite: increased/normal/decreased; thirst: thirstless/moderate/high; sweat: profuse/scanty/offensive; thermals: hot/cold). Peculiar/characteristic symptoms (PQRS — peculiar, queer, rare, strange). Modalities. Miasmatic analysis (psoric/sycotic/syphilitic presentation with clinical evidence).', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Dental case taking fields', sub:'Chief complaint (tooth pain / sensitivity / bleeding / swelling / cosmetic). Affected teeth (tooth chart — click to select affected teeth). Pain type: sharp/dull/throbbing. Duration. Triggers: hot/cold/sweet/spontaneous. X-ray required: Y/N. Previous dental treatment on this tooth. Oral hygiene habits.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Dermatology case taking fields', sub:'Chief complaint. Onset. Distribution (click on body map — front + back human outline SVG). Morphology: macule/papule/plaque/vesicle/pustule/nodule. Size (cm). Colour. Texture. Associated: itching (0–10 scale), burning, pain. Aggravating factors: sun/heat/cold/stress/food. Previous treatment tried.', tags:['PHP','Alpine.js','SVG'], pri:'high' },
      { text:'Physio session case taking', sub:'Chief complaint (body part + symptom). Mechanism of injury. Duration. Previous episodes. Functional limitations (what can\'t they do?). Current treatment. Goals of treatment. Session plan: exercises prescribed (from exercise library). Home program: exercises to do at home.', tags:['PHP','Alpine.js'], pri:'high' },
    ]},
    { icon:'💊', title:'Prescription tab (specialty-adapted)', tasks:[
      { text:'GP mode — drug search + add', sub:'FULLTEXT search input: type drug name or generic name → live results from drugs table (name, generic_name, strength, form). Click to select → add row: drug name, strength, form (pre-filled), dosage (e.g. 1 tablet), frequency dropdown (OD/BD/TDS/QID/SOS), duration (days), instructions (before food / after food / at bedtime / dissolve under tongue). Multiple drugs. Drag to reorder.', tags:['PHP','MySQL FULLTEXT','AJAX'], pri:'high' },
      { text:'Drug allergy check (GP)', sub:'On drug select: compare drug.drug_class + drug.name against patient_allergies. If match found → red modal: "⚠️ Allergy alert: Patient is allergic to {allergen} ({severity}). This drug may cause {reaction}." Doctor must click "Override with reason" to proceed.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Drug interaction check (GP)', sub:'When 2+ drugs added: for each pair → check if drug_A.interactions JSON contains drug_B.id. If yes → amber warning banner: "Potential interaction between {drug_A} and {drug_B}. {interaction note}." Non-blocking but requires acknowledgement.', tags:['PHP','JSON'], pri:'high' },
      { text:'Homeopathy mode — remedy search + potency', sub:'FULLTEXT search on remedies (name, abbreviation). Click to select. Row: remedy name, potency dropdown (6C / 12C / 30C / 200C / 1M / 10M / CM / Q / LM1), form dropdown (pellets/liquid/powder/mother tincture/trituration), dosage (e.g. 4 pills), frequency (OD/BD/TDS/weekly/monthly/SOS), duration, instructions. Multiple remedies allowed.', tags:['PHP','MySQL FULLTEXT'], pri:'high' },
      { text:'Homeopathy — antidote + dietary warning', sub:'On remedy select: load remedies.dietary_restrictions. Show amber info box: "Dietary restrictions for {Remedy}: Avoid coffee, mint, camphor, raw onion. Keep remedy away from strong smells." Always visible while remedy is in prescription. Also show remedies.antidotes (remedies that antidote this one — warn if patient was on them before).', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Prescription PDF generation (mPDF)', sub:'On "Generate Rx PDF": mPDF template with clinic letterhead (logo, name, address, phone, registration number), patient details (name, UHID, age, gender), date, doctor name + qualification, prescription table (drug/remedy, potency, dosage, frequency, duration, instructions), dietary restrictions section (homeo), next visit date, doctor signature area. Save to R2. Log to visits.prescription_pdf_path.', tags:['PHP','mPDF','R2'], pri:'high' },
      { text:'WhatsApp Rx delivery', sub:'On "Send via WhatsApp": queue notification (channel=whatsapp, template=rx_delivery, payload={patient_name, clinic_name, rx_pdf_url (signed R2 URL, 72hr expiry)}). Show "WhatsApp sent" toast. Also send via SMS if SMS module active.', tags:['PHP','WhatsApp'], pri:'high' },
    ]},
    { icon:'📁', title:'Diagnosis + Complete visit', tasks:[
      { text:'Diagnosis entry', sub:'GP: text field + ICD-10 code lookup (type diagnosis → AJAX to /api/icd10/search?q= → show matching codes → select → auto-fill code). Homeopathy: diagnosis text (no ICD-10 needed, but available). Condition score 1–10 slider (all specialties). Follow-up date picker.', tags:['PHP','ICD-10 API'], pri:'high' },
      { text:'Complete visit button', sub:'"Complete visit" → confirm dialog: "Mark visit as complete? You won\'t be able to edit after this." → UPDATE appointments.status = completed → UPDATE visits.visited_at = NOW() → trigger EventBus::fire("visit.completed", payload) → event subscribers: create draft invoice (billing module), queue follow-up reminder (if follow_up_date set). Redirect to patient profile.', tags:['PHP','EventBus'], pri:'high' },
      { text:'Visit history — view-only mode', sub:'Past visits are view-only (status = completed). Show all fields in read-only layout. "Print visit summary" generates a summary PDF. No edit button — only admin can unlock a completed visit (audit trail entry required for unlock).', tags:['PHP','mPDF'], pri:'med' },
    ]},
  ]
},
{
  id:'s7', label:'Sprint 7', num:'Sprint 7 · Week 9–11',
  title:'Billing Pro + WhatsApp Notifications + Team Management',
  sub:'Revenue collection and team operations.',
  color:'#FAECE7', textColor:'#993C1D',
  tags:['PHP','MySQL','Stripe','Razorpay','mPDF','WhatsApp','Mailgun'],
  groups:[
    { icon:'🧾', title:'Billing & invoicing', tasks:[
      { text:'Auto-invoice from completed visit', sub:'EventBus subscriber: on visit.completed → if billing_pro module active → INSERT into invoices (status=draft) with 1 line item: "Consultation fee" at specialty_configs.consultation_fee. Receptionist sees draft invoice in billing queue.', tags:['PHP','EventBus'], pri:'high' },
      { text:'Invoice editor — /billing/{id}', sub:'Edit line items: add/remove/edit description, item_type, qty, unit_price. Discount (flat or %). Tax auto-calc. Total updates live (Alpine.js). Payment mode selector. Notes field. "Save draft" and "Finalise & send" buttons.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'UPI QR payment (Razorpay)', sub:'On invoice screen: "Collect payment" → generate Razorpay order (amount = total). Display UPI QR code. Poll /api/check-payment/{razorpay_order_id} every 3s → on paid → update invoice status=paid, payments table INSERT, EventBus::fire("invoice.paid"). Show confetti + "Payment received ₹{amount}".', tags:['Razorpay','PHP','AJAX'], pri:'high' },
      { text:'Stripe card payment (global)', sub:'Stripe.js PaymentElement in modal. On submit → Stripe handles 3DS. On success → stripe webhook confirms → same invoice.paid event.', tags:['Stripe.js','PHP'], pri:'high' },
      { text:'Cash payment recording', sub:'"Cash received" button → enter amount received → calculate change due → mark invoice as paid → INSERT into payments. Simple, quick, no gateway.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Invoice PDF (mPDF)', sub:'Template: clinic header (logo, name, GSTIN, address), invoice number, date, patient details, itemised table (description, qty, rate, amount), subtotal, discount, tax (GST/VAT label from specialty_configs), total, payment mode, "Thank you for visiting" footer. Save to R2. WhatsApp to patient on payment.', tags:['PHP','mPDF','R2'], pri:'high' },
      { text:'Invoice list + revenue reports', sub:'/billing page: table of all invoices (date, patient, amount, status, mode). Filter: by status, date range, doctor. Total at bottom. "Export to Excel" (PhpSpreadsheet). "Tally XML export" for selected date range.', tags:['PHP','PhpSpreadsheet'], pri:'med' },
      { text:'Advance collection', sub:'Patient can pay deposit before final billing. "Record advance" on patient profile → INSERT into payments with type=advance, linked to patient not invoice. On final invoice: show "Advance paid: ₹{amount}" as deduction from total.', tags:['PHP','MySQL'], pri:'med' },
    ]},
    { icon:'💬', title:'WhatsApp notification system', tasks:[
      { text:'Notification worker cron (every 5 min)', sub:'PHP CLI script: /workers/notification_worker.php. SELECT * FROM notifications WHERE status=queued AND scheduled_at <= NOW() AND clinic_id IN (active clinics) LIMIT 100. For each: call Meta Cloud API or Twilio. On 200: UPDATE status=sent. On error: UPDATE attempts++. If attempts >= 3: status=failed (log error_log). Run via cron: */5 * * * * php /workers/notification_worker.php', tags:['PHP','Cron','Meta API','Twilio'], pri:'high' },
      { text:'Appointment reminder scheduler (cron daily)', sub:'Daily cron (7AM UTC): SELECT appointments WHERE DATE(scheduled_at) = DATE_ADD(CURDATE(), INTERVAL 1 DAY) AND reminder_sent=0 AND clinic_id IN (active clinics). For each: check clinic timezone → convert. Queue 24h reminder + 1h reminder. SET reminder_sent=1.', tags:['PHP','Cron','MySQL'], pri:'high' },
      { text:'WhatsApp template: appointment_reminder', sub:'Template: "Hello {patient_name}, reminder: your appointment with {doctor_name} at {clinic_name} is tomorrow at {time}. Reply STOP to cancel. Location: {address}" — must be approved by Meta (submit in onboarding). Test via test button in Settings.', tags:['Meta API'], pri:'high' },
      { text:'WhatsApp template: rx_delivery', sub:'"Hello {patient_name}, your prescription from Dr. {doctor_name} at {clinic_name} is ready. Download: {rx_pdf_url} (valid 72hrs). For any queries call {clinic_phone}."', tags:['Meta API'], pri:'high' },
      { text:'WhatsApp template: follow_up_reminder', sub:'"Hello {patient_name}, reminder: Dr. {doctor_name} recommended a follow-up visit today. Call {clinic_phone} to confirm your appointment."', tags:['Meta API'], pri:'high' },
      { text:'WhatsApp template: lab_report_ready', sub:'"Hello {patient_name}, your lab report is ready. Download here: {report_url} (valid 24hrs). If you have questions, contact Dr. {doctor_name} at {clinic_phone}."', tags:['Meta API'], pri:'med' },
      { text:'WhatsApp template: invoice_paid', sub:'"Hello {patient_name}, payment of {currency}{amount} received at {clinic_name}. Invoice #{invoice_number}. Download: {invoice_url}. Thank you!"', tags:['Meta API'], pri:'med' },
      { text:'SMS fallback (Twilio)', sub:'If WhatsApp delivery fails after 3 attempts AND sms_email module is active → queue SMS via Twilio with short text version of same message. Twilio: use /messages endpoint. Log to notifications table (channel=sms, parent_notification_id=original).', tags:['Twilio','PHP'], pri:'med' },
    ]},
    { icon:'👥', title:'Team / user management', tasks:[
      { text:'Team page — /settings/team', sub:'List of all users in clinic. Columns: Name, Role, Email, Status (active/pending/inactive), Last active, Seat badge (owner or seat #). Seat usage bar at top: "3 of 8 seats used". "Invite member" button (hidden if seat limit reached → show "Upgrade plan" instead).', tags:['PHP','Tailwind'], pri:'high' },
      { text:'Invite staff flow — modal', sub:'Admin clicks "Invite member" → modal: Name, Email, Role (doctor/nurse/receptionist/labtech) — radio buttons with role description. Click "Send invitation" → SeatService::sendInvite() → INSERT staff_invitations → send email (Mailgun template: staff_invite). Show "Invitation sent to {email}" toast. Invitation appears in team list with "Pending" badge.', tags:['PHP','Mailgun','SeatService'], pri:'high' },
      { text:'Accept invitation — /accept-invite/{token}', sub:'No-auth page. Verify token (hash → DB lookup → check status=pending AND expires_at > NOW()). Show: "You\'ve been invited to join {clinic_name} as {role}". Password + confirm password fields. On submit: SeatService::acceptInvite() → create users row → update invitation status → auto-login → redirect to dashboard. Invalid token: "This invitation has expired or been revoked."', tags:['PHP','MySQL'], pri:'high' },
      { text:'Edit staff — role + custom permissions', sub:'Admin clicks "Edit" on staff row → modal: change role (dropdown), toggle custom permissions (checklist of permission keys with on/off). Save → UPDATE users SET role, custom_permissions. RBAC takes effect on next page load (clear user\'s Redis session cache).', tags:['PHP','Alpine.js','Redis'], pri:'high' },
      { text:'Deactivate staff', sub:'Confirm dialog: "Deactivate {name}? They will lose access immediately. All their patient records and visits will be preserved." → UPDATE users SET is_active=0. Frees 1 seat. Audit log entry.', tags:['PHP','MySQL'], pri:'high' },
      { text:'Seat limit enforcement', sub:'On every "Invite" click: SeatService::canAddStaff() → if false → hide button, show "Seat limit reached" message with "Upgrade plan" and "Add extra seat ($5/mo)" buttons. Extra seat purchase → Stripe add SubscriptionItem for extra_seat module × quantity → webhook updates tenants.extra_seats_purchased.', tags:['PHP','Stripe','SeatService'], pri:'high' },
    ]},
  ]
},
{
  id:'s8', label:'Sprint 8', num:'Sprint 8 · Week 11–13',
  title:'Lab LIS + Pharmacy POS + Consent Forms + Discharge Summary',
  sub:'The clinical support modules that complete a full clinic workflow.',
  color:'#EEEDFE', textColor:'#534AB7',
  tags:['PHP','MySQL','mPDF','R2','Barcode'],
  groups:[
    { icon:'🔬', title:'Lab module (full LIS)', tasks:[
      { text:'Test catalog setup — /lab/catalog', sub:'Admin configures test catalog: test_code, test_name, category, parameters JSON [{name,unit,normal_min,normal_max,critical_low,critical_high}], sample_type, TAT hours, rate. Pre-seeded with common tests: CBC, LFT, RFT, KFT, TSH, T3, T4, HbA1c, Lipid Profile, Urine R/M. FULLTEXT search.', tags:['PHP','MySQL JSON'], pri:'high' },
      { text:'Order lab tests from visit screen', sub:'In visit: Lab tab → search test catalog → add to order. Multiple tests per visit. On "Place order": INSERT into lab_orders (one row per test). Mark sample collection needed. Notification to lab tech if lab_tech role exists.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Barcode label print', sub:'On lab order creation: generate barcode (use picqer/php-barcode-generator) → embed in small mPDF label (60×30mm): barcode, patient name, UHID, test name, sample type, date. Print via browser print dialog. Attach to sample tube/container.', tags:['PHP','mPDF','Barcode'], pri:'med' },
      { text:'Sample collection + result entry', sub:'Lab tech screen: list of pending lab orders. Select order → scan barcode or search. Mark sample collected (timestamp). Enter result per parameter: value input → auto-compare to normal_min/normal_max → set flag (normal/low/high/critical_low/critical_high). Save → INSERT lab_results rows. Critical flag → auto-queue WhatsApp alert to ordering doctor.', tags:['PHP','Alpine.js','WhatsApp'], pri:'high' },
      { text:'Report PDF generation', sub:'mPDF template: clinic header, patient details, test name, table of parameters (name | value | unit | normal range | flag [H/L/C]). Abnormal values highlighted in red/amber. Footer: "Verified by {lab_tech_name}". Save to R2. Update lab_orders.report_path + status=resulted.', tags:['PHP','mPDF','R2'], pri:'high' },
      { text:'Share report — 24hr signed URL + WhatsApp', sub:'Generate share_token (UUID). Store in lab_orders.share_token with 24hr expiry. WhatsApp message sent to patient. Link: /lab/report/{share_token} → verifies expiry → serves PDF from R2. Patient portal also shows report if portal module active.', tags:['PHP','R2','WhatsApp'], pri:'high' },
    ]},
    { icon:'💊', title:'Pharmacy POS', tasks:[
      { text:'POS billing screen — /pharmacy/pos', sub:'Search drug by name → add to bill → quantity → auto-fill selling_price from pharmacy_inventory (FIFO: earliest expiry batch first). Multiple items. Show total. Payment: cash / UPI. On confirm: INSERT into invoice (linked to patient if patient selected) + deduct stock (UPDATE pharmacy_inventory SET quantity = quantity - sold_qty for FIFO batch).', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Inventory management — /pharmacy/inventory', sub:'Table: drug name, batch, quantity, expiry date, location, low stock alert status. Add stock: select drug → batch number, quantity, expiry, purchase price, selling price, supplier. Update existing batch. Mark batch as expired/disposed.', tags:['PHP','MySQL'], pri:'high' },
      { text:'Low stock + expiry cron alerts', sub:'Daily cron (6AM): SELECT from pharmacy_inventory WHERE (quantity <= low_stock_threshold OR expiry_date <= DATE_ADD(CURDATE(), INTERVAL 30 DAY)) AND clinic_id = ?. For each: queue WhatsApp alert to admin (template: stock_alert). Show on dashboard alert widget.', tags:['PHP','Cron','WhatsApp'], pri:'high' },
      { text:'Narcotic/Schedule-H drug register', sub:'For drugs with schedule = H or H1: every dispensing → mandatory entry in narcotic register: patient name + address + prescribing doctor name + drug + quantity + date. Separate report: /pharmacy/narcotic-register (printable, date range filter). Legal requirement.', tags:['PHP','MySQL'], pri:'high' },
    ]},
    { icon:'📋', title:'Consent forms', tasks:[
      { text:'Consent form templates — /settings/consent-forms', sub:'Admin manages template library. Create/edit form: type (general/surgical/anaesthesia/procedure/research/photography), title, body text (rich text editor with {patient_name}, {clinic_name}, {date} merge fields), version number. Activate/deactivate templates.', tags:['PHP','TipTap'], pri:'med' },
      { text:'Collect consent — from visit screen', sub:'Visit > Consent tab → select form template → rendered with patient details auto-filled. Show on screen for patient/guardian to read. Draw signature on tablet canvas (finger/stylus). Enter witness name. "Sign & save" → SHA-256 hash of (form_content + patient_id + timestamp) → store hash. Generate signed PDF (mPDF). Save to R2.', tags:['PHP','Canvas API','mPDF','SHA-256'], pri:'high' },
      { text:'Consent verification', sub:'On viewing a saved consent: recalculate SHA-256 of stored content → compare to stored hash → if match: show "✓ Verified — untampered". If mismatch: show red "⚠️ Consent form may have been altered". Admissible as evidence of digital signing integrity.', tags:['PHP','SHA-256'], pri:'med' },
    ]},
    { icon:'📄', title:'Discharge summary', tasks:[
      { text:'Discharge summary form', sub:'From patient profile or visit: "Create discharge summary" → structured form: final diagnosis (auto-filled from visit.diagnosis), ICD-10 code, procedures done, treatment summary (rich text, auto-filled from visit.clinical_notes), condition at discharge (improved/same/deteriorated), medications at discharge (auto-populated from last prescription), follow-up instructions, diet at discharge. Status: draft (editable) → finalized (locked).', tags:['PHP','Alpine.js','TipTap'], pri:'high' },
      { text:'Doctor e-signature', sub:'Signature canvas at bottom of form. Doctor signs with mouse/stylus. On "Finalize": embed signature PNG in mPDF → generate final discharge summary PDF → save to R2 → SET status=finalized. Once finalized: no edits allowed. "Unlock" only by admin (audit log entry required).', tags:['PHP','Canvas API','mPDF','R2'], pri:'high' },
      { text:'WhatsApp + portal delivery', sub:'On finalize: queue WhatsApp with signed discharge summary PDF (signed R2 URL 72hr). If patient portal active: available in portal immediately.', tags:['PHP','WhatsApp'], pri:'med' },
    ]},
  ]
},
{
  id:'s9', label:'Sprint 9', num:'Sprint 9 · Week 13–15',
  title:'Analytics + CRM + Staff + Doctor Incentives + Advanced Scheduling',
  sub:'Operations intelligence and growth tools.',
  color:'#F1EFE8', textColor:'#5F5E5A',
  tags:['PHP','Chart.js','D3.js','PhpSpreadsheet','Alpine.js'],
  groups:[
    { icon:'📊', title:'Analytics dashboard', tasks:[
      { text:'Nightly analytics aggregator cron', sub:'Cron midnight: aggregate prior day stats per clinic → INSERT/UPDATE into analytics_snapshots table (clinic_id, date, metric_key, metric_value). Metrics: total_patients_visited, new_patients, revenue_cash, revenue_upi, revenue_card, appointments_completed, no_show_count, top_diagnoses JSON, top_doctors JSON. Dashboard reads from snapshots — fast, no heavy queries.', tags:['PHP','Cron','MySQL'], pri:'high' },
      { text:'Revenue trend chart', sub:'12-month bar chart. X: months. Y: revenue (INR/USD). Bars grouped by payment mode (cash/UPI/card). Click month → drill down to that month\'s invoice list. Data from analytics_snapshots.', tags:['Chart.js','PHP'], pri:'high' },
      { text:'Patient flow chart', sub:'Line chart: new patients vs returning patients per month. X: months, Y: count. Helps clinic see growth trend.', tags:['Chart.js','PHP'], pri:'high' },
      { text:'No-show heatmap', sub:'D3.js grid: 7 columns (days of week) × 24 rows (hours). Cell colour = no-show rate. Hover: "Tuesday 11AM: 3 no-shows (18%)". Helps clinic identify high no-show time slots to double-book or add waitlist.', tags:['D3.js','PHP'], pri:'med' },
      { text:'Revenue & expense tracker', sub:'Expenses tab: log expenses by category (rent/utilities/salaries/consumables/equipment/marketing/maintenance/other), amount, date, paid via. Monthly P&L: total revenue - total expenses = net profit. Shown as summary tile + bar chart. "Export to Excel" (PhpSpreadsheet). "Tally XML" export for accountant.', tags:['PHP','PhpSpreadsheet'], pri:'high' },
      { text:'Doctor performance report', sub:'Table: each doctor → patients seen / revenue generated / avg condition score / follow-up rate / no-show rate. Sort by any column. Date range filter. Export to Excel.', tags:['PHP','PhpSpreadsheet'], pri:'med' },
    ]},
    { icon:'📞', title:'CRM & lead management', tasks:[
      { text:'CRM leads list — /crm', sub:'Table: lead name, phone, source, status, assigned to, follow-up date, created date. Filter by status/source/assigned staff. Count by status shown as kanban column totals (new/contacted/follow-up/converted/lost). "Add lead" button.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Add/edit lead form', sub:'Fields: name, phone, email, inquiry about, source (website/google_ads/instagram/facebook/walk_in/referral/whatsapp/ivr/other), referring doctor (dropdown — active doctors), assign to (dropdown — active staff), follow-up date, notes. Source field has UTM parameter auto-fill if coming from website.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Convert lead to patient', sub:'"Convert" button on lead → opens patient registration form pre-filled with lead data (name, phone, email). On save: UPDATE crm_leads SET status=converted, converted_patient_id={new_patient_id}. Lead marked done. Can then book appointment directly.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Follow-up reminder cron', sub:'Daily cron: SELECT crm_leads WHERE follow_up_date = TODAY AND status IN (new, contacted, follow_up). For each: queue WhatsApp to assigned staff member: "Reminder: Follow up with {lead_name} ({phone}) today. Inquiry: {inquiry_about}"', tags:['PHP','Cron','WhatsApp'], pri:'high' },
      { text:'Source conversion report', sub:'Bar chart: leads by source. Conversion rate per source (leads converted / total leads × 100%). Helps clinic see which marketing channel converts best. Monthly trend line per source.', tags:['Chart.js','PHP'], pri:'med' },
    ]},
    { icon:'👥', title:'Staff attendance & leaves', tasks:[
      { text:'Clock in/out — /staff/attendance', sub:'Staff lands on dashboard → "Clock in" button (if not clocked in). Click → INSERT staff_attendance (date=today, clock_in=NOW()). Clock out → UPDATE clock_out=NOW(). Show today\'s duration. Admin can manually edit clock in/out (with audit log entry).', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Attendance report', sub:'Monthly calendar view per staff. Colour coded: green=present, red=absent, amber=half-day, blue=leave, grey=holiday. Summary: days present / absent / leave taken. Export to Excel.', tags:['PHP','Chart.js','PhpSpreadsheet'], pri:'med' },
      { text:'Leave management', sub:'Staff submits leave request: type (CL/SL/EL/LWP/other), from_date, to_date, reason. Admin sees pending requests → approve / reject → WhatsApp notification to staff. Leave calendar: all approved leaves shown. Leave balance: {CL balance: 5 remaining}.', tags:['PHP','Alpine.js','WhatsApp'], pri:'med' },
    ]},
    { icon:'💰', title:'Doctor incentive calculator', tasks:[
      { text:'Incentive config per doctor', sub:'Admin: Settings > Incentives. Per doctor: incentive_percent (% of revenue attributed to them) OR flat_fee per visit OR both. Update users.incentive_percent. Visiting consultant option: different rate for consultants who are not full-time staff.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Monthly incentive calculation (cron)', sub:'1st of each month cron: for each doctor, SELECT SUM(invoices.total) WHERE attributed_doctor_id = doctor.id AND paid_at BETWEEN period_start AND period_end → INSERT into doctor_incentives (revenue_generated, incentive_percent, gross_incentive=GENERATED, tds_amount, net_payable). Admin reviews and marks paid.', tags:['PHP','Cron','MySQL'], pri:'high' },
      { text:'Incentive report page', sub:'/billing/incentives. Table: month, doctor name, revenue generated, gross incentive, TDS, net payable, status (pending/paid/hold). Mark as paid → update status + paid_at. Export to Excel (for CA/payroll). Print payslip-style PDF per doctor.', tags:['PHP','mPDF','PhpSpreadsheet'], pri:'med' },
    ]},
    { icon:'📅', title:'Advanced scheduling (multi-doctor)', tasks:[
      { text:'Per-doctor schedule config', sub:'Admin: Settings > Schedules. Select doctor → set schedule: day by day, start time, end time, slot duration, max patients. Can set different durations for different days (e.g. Mon 15-min slots, Sat 30-min slots). Save → INSERT/UPDATE doctor_schedules.', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Public booking page — /book/{clinic-slug}', sub:'No login required. Shows: clinic name + logo, specialty + brief description, doctor list (each doctor photo + name + designation). Patient selects doctor → date picker → slot grid (from /api/slots endpoint). Enter name + phone + chief complaint → submit → appointment created (status=scheduled) → WhatsApp confirmation sent.', tags:['PHP','Alpine.js','Tailwind'], pri:'high' },
      { text:'Waiting list', sub:'If all slots full: "Join waiting list" → INSERT into waiting_list (patient_id, doctor_id, preferred_date). If a slot opens (cancellation): trigger cron check → first person on waiting list for that doctor+date → send WhatsApp: "A slot has opened for Dr. {name} on {date}. Book now: {booking_url}". Mark notified=1.', tags:['PHP','MySQL','WhatsApp'], pri:'med' },
      { text:'Google Calendar sync', sub:'Doctor connects Google Calendar (OAuth2). On appointment create/update/cancel: Google Calendar API event create/update/delete. Two-way: if event deleted in Google Calendar → mark appointment cancelled in ManageClinic. Per-doctor OAuth token stored in specialty_configs.google_calendar_token (encrypted).', tags:['Google Calendar API','OAuth2','PHP'], pri:'med' },
    ]},
  ]
},
{
  id:'s10', label:'Sprint 10', num:'Sprint 10 · Week 15–17',
  title:'Patient Portal + Telemedicine + Diet Plans + Before/After Photos',
  sub:'Patient-facing features and the enterprise differentiators.',
  color:'#E1F5EE', textColor:'#0F6E56',
  tags:['PHP','Twilio','Google Meet','mPDF','R2','Alpine.js'],
  groups:[
    { icon:'👤', title:'Patient portal — portal.manageclinic.com/{slug}', tasks:[
      { text:'Portal login — phone OTP', sub:'Enter phone number → send OTP via Twilio SMS (6-digit, 10 min expiry) → INSERT into otp_tokens. Enter OTP → verify (hash match + expiry check) → find patient by phone + clinic → create session. "No account? Your doctor\'s receptionist can link your records." No self-registration — patient must exist in system first.', tags:['Twilio','PHP','MySQL'], pri:'high' },
      { text:'Portal dashboard', sub:'Welcome: "Hello {patient_name}". Quick stats: Total visits, Next appointment, Last Rx date. Navigation: Visits · Prescriptions · Invoices · Lab Reports · Appointments.', tags:['PHP','Tailwind'], pri:'high' },
      { text:'Visit history', sub:'Timeline of all visits (readonly). Each: date, doctor, diagnosis, condition score. Click → expand to see vitals, prescription, notes (no edit).', tags:['PHP'], pri:'high' },
      { text:'Prescription download', sub:'List of all prescriptions grouped by visit. "Download PDF" → generate 24hr signed R2 URL → redirect. Patient can view and download without doctor being present.', tags:['PHP','R2'], pri:'high' },
      { text:'Invoice download', sub:'All invoices with status, amount, date. "Download PDF" → signed R2 URL.', tags:['PHP','R2'], pri:'high' },
      { text:'Lab reports in portal', sub:'List of lab reports with share_token. If share_token not expired → show "Download". If expired → show "Expired — contact clinic". Report includes all parameters with flags.', tags:['PHP','R2'], pri:'med' },
      { text:'Book appointment from portal', sub:'If advanced_scheduling module active for this clinic: patient can book appointment directly from portal. Same public booking page flow, but pre-filled with patient details (from session).', tags:['PHP','Alpine.js'], pri:'med' },
    ]},
    { icon:'📹', title:'Telemedicine', tasks:[
      { text:'Online appointment booking', sub:'Portal/public booking: appointment type = "Online consultation". Creates appointment with type=online. Admin notified via WhatsApp: "New online consultation request from {patient_name} for {date_time}."', tags:['PHP','WhatsApp'], pri:'high' },
      { text:'Google Meet link generation', sub:'Admin confirms online appointment → system calls Google Meet API (clinic\'s OAuth token) → creates meeting with title: "ManageClinic: Dr.{name} + {patient_name}" + start/end time. Returns meet_link. Store in appointments.meet_link (add column).', tags:['Google Meet API','PHP'], pri:'high' },
      { text:'Meeting link delivery', sub:'WhatsApp to patient: "Your online consultation with Dr. {name} at {clinic_name} is confirmed for {date} {time}. Join here: {meet_link}". Also email via Mailgun. Reminder 1hr before (same cron system).', tags:['PHP','WhatsApp','Mailgun'], pri:'high' },
      { text:'Session notes for online visit', sub:'Doctor opens visit screen (same as in-person visit). Can open Google Meet in a separate browser tab. All EMR/Rx features available. On complete: e-Rx auto-generated and WhatsApp to patient.', tags:['PHP'], pri:'med' },
    ]},
    { icon:'🥗', title:'Diet & nutrition plans', tasks:[
      { text:'Diet plan creation from visit', sub:'Visit screen > Diet tab (if diet module active). Doctor selects: condition (thyroid/diabetes/skin/digestive/hormonal/cardiac/weight_loss/other). Patient veg_type auto-loaded from patients table. 7-day meal plan template loads based on condition + veg_type. Doctor edits any day/meal. Homeopathy: show antidote restrictions from prescribed remedy (remedies.dietary_restrictions auto-pulled).', tags:['PHP','Alpine.js'], pri:'high' },
      { text:'Diet plan PDF (mPDF)', sub:'Template: clinic letterhead, patient name, date, condition treated, dietary note ("For best results with your homeopathic remedy, avoid: coffee, mint, camphor"), 7-day table (Mon–Sun × Breakfast/Lunch/Dinner/Snacks). Save to R2.', tags:['PHP','mPDF','R2'], pri:'high' },
      { text:'WhatsApp delivery', sub:'"Send diet plan" button → queue WhatsApp with diet plan PDF. Patient receives: "Hello {name}, Dr. {doctor} has sent your personalised diet plan. Download: {pdf_url}"', tags:['PHP','WhatsApp'], pri:'high' },
    ]},
    { icon:'📷', title:'Before/After photo tracking', tasks:[
      { text:'Photo upload per visit', sub:'Visit screen > Photos tab (if before_after module active). Upload photo: type (before/after/progress), condition label (e.g. "Psoriasis Week 8"), date auto-filled. Multiple photos per visit. Store in R2 at /{clinic_id}/patients/{patient_id}/photos/{uuid}.jpg.', tags:['PHP','R2','Alpine.js'], pri:'high' },
      { text:'Patient photo timeline', sub:'Patient profile > Photos tab: chronological timeline of all photos grouped by type. Side-by-side comparison view: select "before" and "after" images → show split-view lightbox. Shows condition score trend below photos (vitals.skin_score over time).', tags:['PHP','Alpine.js','CSS'], pri:'high' },
      { text:'Public gallery flag', sub:'is_public toggle per photo. When toggled ON → fire EventBus event: photo.marked_public → webhook to clinic\'s website (if configured) → add to website before/after gallery. Toggle OFF → webhook to remove. Requires clinic to provide website webhook URL in settings.', tags:['PHP','EventBus','Webhook'], pri:'low' },
    ]},
  ]
},
{
  id:'s11', label:'Sprint 11', num:'Sprint 11 · Week 17–19',
  title:'Super Admin + Directory + REST API + White-Label',
  sub:'The platform layer. Monetisation, SEO flywheel, and API for integrations.',
  color:'#FBEAF0', textColor:'#993556',
  tags:['PHP','Stripe','SEO','API','Let\'s Encrypt','Mailgun'],
  groups:[
    { icon:'🛠️', title:'Super admin panel — admin.manageclinic.com', tasks:[
      { text:'Super admin auth (separate JWT secret)', sub:'Completely separate auth from clinic apps. Login: email + password, role must = superadmin. Different JWT secret key. Different session. Cannot access clinic subdomain apps with superadmin session.', tags:['PHP','JWT'], pri:'high' },
      { text:'All clinics list', sub:'Table: clinic name, slug, specialty, plan, seats used, MRR, country, created date, last login, status (active/suspended). Search + filter by plan/specialty/country. Click → clinic detail page.', tags:['PHP','MySQL'], pri:'high' },
      { text:'MRR / ARR dashboard', sub:'Total MRR (sum of all active module subscriptions). ARR = MRR × 12. Chart: MRR growth last 12 months. Module-wise revenue breakdown (which modules earn most). Plan distribution donut. Churn rate (clinics that cancelled this month / active last month × 100%).', tags:['Chart.js','Stripe API','PHP'], pri:'high' },
      { text:'Impersonate clinic (support)', sub:'"Impersonate" button on clinic detail. Generates a time-limited one-time token (valid 30 min) → admin opens clinic\'s subdomain with ?impersonate={token}. TenantMiddleware detects token → load that clinic as admin. Impersonation session logged in audit_log. "Exit impersonation" banner shown always.', tags:['PHP','Redis'], pri:'high' },
      { text:'Churn risk flags', sub:'Auto-flag clinics: no login in 14 days, trial expiring in 3 days, payment failed, 0 patients added (never used). Shown as red/amber row highlight + notification bell count. Trigger outreach email via Mailgun (template: churn_prevention).', tags:['PHP','Cron','Mailgun'], pri:'med' },
    ]},
    { icon:'🗺️', title:'Doctors directory — manageclinic.com/doctors', tasks:[
