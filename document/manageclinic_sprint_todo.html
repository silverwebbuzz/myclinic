      { text:'Auto-populate from clinic accounts', sub:'Cron nightly: for each user with role=doctor who hasn\'t opted out: check if doctor_profiles row exists. If not: INSERT with data from users + tenants + specialty_configs. Slug: dr-{firstname}-{lastname} (deduplicate with -2, -3 suffix). is_public=1 by default. Doctor can opt out in Settings > Profile.', tags:['PHP','Cron','MySQL'], pri:'high' },
      { text:'City + specialty SEO pages', sub:'Dynamic routes: /doctors/{city}/{specialty}. Load directory_cities + filter doctor_profiles + doctor_locations by city + specialty. Meta title: "Best {specialty} doctors in {city} | ManageClinic". Meta description auto-generated. Sitemap.xml includes all city+specialty combinations. These pages indexed by Google from day 1.', tags:['PHP','SEO'], pri:'high' },
      { text:'Doctor profile SEO page', sub:'/doctors/{city}/{specialty}/{doctor-slug}. Full profile: photo, name, degrees, languages, experience, bio, consultation fee, clinic address + map, working hours, rating, reviews. Structured data (JSON-LD: MedicalBusiness schema). "Book appointment" button → clinic\'s public booking page.', tags:['PHP','SEO','JSON-LD'], pri:'high' },
      { text:'Doctor reviews', sub:'Public review form on doctor profile. Fields: reviewer name, rating (1–5 stars), title, review body, condition treated. Submit → INSERT into doctor_reviews (is_approved=0). Admin approves/rejects in super admin panel. Approved reviews update doctor_profiles.avg_rating (recalculate on each approval).', tags:['PHP','MySQL'], pri:'med' },
      { text:'Featured listing payments', sub:'Doctor can "Feature my profile" for $15–$50/mo per city+specialty slot. Super admin sets prices per city. Stripe Checkout → on payment: INSERT into doctor_featured_slots → set doctor_profiles.is_featured=1, featured_until=period_end. Expired featured → is_featured=0 (cron daily).', tags:['PHP','Stripe'], pri:'med' },
    ]},
    { icon:'🔌', title:'REST API v1 — api.manageclinic.com/v1', tasks:[
      { text:'API key management — /settings/api', sub:'Admin creates API key: name + scopes (patients:read / appointments:write / invoices:read / etc). System generates 64-char key → display once → store bcrypt hash in api_keys. Key shown in UI: "mc_live_xxxxx". Rate limit: 1000 req/hr per key.', tags:['PHP','MySQL'], pri:'med' },
      { text:'API auth middleware', sub:'API routes: extract Bearer token from Authorization header → hash → compare to api_keys.key_hash → load clinic from api_keys.clinic_id → check scopes for requested endpoint → inject into request context. No JWT for API — API key only.', tags:['PHP'], pri:'med' },

let allTasks = [];
let doneTasks = new Set(JSON.parse(localStorage.getItem('mc_done') || '[]'));

function buildAll(){
  const nav = document.getElementById('sprintNav');
  const content = document.getElementById('sprintContent');
  nav.innerHTML = '';
  content.innerHTML = '';

  SPRINTS.forEach((sp, si)=>{
    // nav button
    const btn = document.createElement('button');
    btn.className = 'sn' + (si===0?' on':'');
    btn.textContent = sp.label;
    btn.onclick = ()=>{
      document.querySelectorAll('.sn').forEach(b=>b.classList.remove('on'));
      document.querySelectorAll('.sprint-block').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById(sp.id).classList.add('on');
    };
    nav.appendChild(btn);

    // sprint block
    const block = document.createElement('div');
    block.id = sp.id;
    block.className = 'sprint-block' + (si===0?' on':'');

    // header
    let taskCount = 0;
    sp.groups.forEach(g=>taskCount+=g.tasks.length);

    const header = document.createElement('div');
    header.className = 'sprint-header';
    header.style.background = sp.color;
    header.style.color = sp.textColor;
    header.innerHTML = `<div class="sh-left">
      <div class="sh-num" style="opacity:.7">${sp.num}</div>
      <div class="sh-title">${sp.title}</div>
      <div class="sh-sub">${sp.sub}</div>
      <div class="sh-meta">${sp.tags.map(t=>`<span class="sh-tag">${t}</span>`).join('')}</div>
    </div>
    <div id="${sp.id}_prog" style="text-align:right;min-width:80px">
      <div style="font-size:22px;font-weight:500" id="${sp.id}_frac">0/${taskCount}</div>
      <div style="font-size:11px;opacity:.7">tasks done</div>
    </div>`;
    block.appendChild(header);

    // groups
    sp.groups.forEach(g=>{
      const grp = document.createElement('div');
      grp.className = 'task-group';

      const head = document.createElement('div');
      head.className = 'tg-head';
      head.innerHTML = `<span class="tg-icon">${g.icon}</span><span class="tg-title">${g.title}</span><span class="tg-count" id="${sp.id}_${g.title.replace(/\s/g,'_')}_count">${g.tasks.length} tasks</span>`;
      grp.appendChild(head);

      g.tasks.forEach((t,ti)=>{
        const taskId = `${sp.id}_${g.title}_${ti}`;
        allTasks.push(taskId);

        const row = document.createElement('div');
        row.className = 'task' + (doneTasks.has(taskId) ? ' done' : '');
        row.onclick = ()=>toggleTask(taskId, row);

        const priMap = {high:'p-high', med:'p-med', low:'p-low'};
        const priLabel = {high:'High', med:'Med', low:'Low'};

        row.innerHTML = `<div class="check-box"></div>
          <div class="task-body">
            <div class="task-text">${t.text}</div>
            ${t.sub ? `<div class="task-sub">${t.sub}</div>` : ''}
            ${t.tags ? `<div class="task-tags">${t.tags.map(tg=>`<span class="tt">${tg}</span>`).join('')}</div>` : ''}
          </div>
          <div class="task-pri ${priMap[t.pri]}">${priLabel[t.pri]}</div>`;
        grp.appendChild(row);
      });
      block.appendChild(grp);
    });
    content.appendChild(block);
  });

  updateCounts();
  buildOverall();
}

function toggleTask(id, row){
  if(doneTasks.has(id)){doneTasks.delete(id);row.classList.remove('done');}
  else{doneTasks.add(id);row.classList.add('done');}
  localStorage.setItem('mc_done', JSON.stringify([...doneTasks]));
  updateCounts();
  buildOverall();
}

function updateCounts(){
  const total = allTasks.length;
  const done = allTasks.filter(id=>doneTasks.has(id)).length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('remCount').textContent = total - done;

  SPRINTS.forEach(sp=>{
    let spTotal=0, spDone=0;
    sp.groups.forEach(g=>{
      g.tasks.forEach((t,ti)=>{
        const id = `${sp.id}_${g.title}_${ti}`;
        spTotal++;
        if(doneTasks.has(id)) spDone++;
      });
    });
    const fracEl = document.getElementById(sp.id+'_frac');
    if(fracEl) fracEl.textContent = `${spDone}/${spTotal}`;
  });
}

function buildOverall(){
  const total = allTasks.length;
  const done = allTasks.filter(id=>doneTasks.has(id)).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const op = document.getElementById('overallProgress');

  const sprintRows = SPRINTS.map(sp=>{
    let spTotal=0,spDone=0;
    sp.groups.forEach(g=>g.tasks.forEach((t,ti)=>{
      spTotal++;
      if(doneTasks.has(`${sp.id}_${g.title}_${ti}`)) spDone++;
    }));
    const p = spTotal ? Math.round(spDone/spTotal*100) : 0;
    const colors = ['#D85A30','#7F77DD','#378ADD','#1D9E75','#EF9F27','#639922','#993C1D','#534AB7','#5F5E5A','#185FA5','#993556','#888780'];
    return `<div class="op-row">
      <div class="op-label" style="font-size:11px">${sp.label}</div>
      <div class="op-bar"><div class="op-fill" style="width:${p}%;background:${colors[SPRINTS.indexOf(sp)]}"></div></div>
      <div class="op-count">${spDone}/${spTotal}</div>
    </div>`;
  }).join('');

  op.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div style="font-size:13px;font-weight:500">Overall progress</div>
    <div style="font-size:13px;font-weight:500;color:#0F9B6E">${pct}% · ${done}/${total} tasks</div>
  </div>
  <div class="progress-bar" style="height:8px;margin-bottom:14px"><div class="pb-fill" style="width:${pct}%;background:#0F9B6E"></div></div>
  ${sprintRows}`;
}

buildAll();
</script>
